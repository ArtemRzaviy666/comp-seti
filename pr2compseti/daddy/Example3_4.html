<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Многоуровневый список</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Разделы курса</h1>
    <ol>
        <li>
            Теги заголовков
            <ol type="a">
                <li>h1</li>
                <li>h2</li>
                <li>h3</li>
                <li>h4</li>
            </ol>
        </li>
        <ol type="square">
            Теги списков
            <ol>
                <li>ol</li>
                <li>li</li>
            </ol>
        </ol>
    </ol>
</body>
</html>
